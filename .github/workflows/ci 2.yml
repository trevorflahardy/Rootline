name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun test
      - name: Build
        run: bun run build
